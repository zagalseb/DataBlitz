<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="manifest" href="/DataBlitz/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="DataBlitz">
  <meta name="theme-color" content="#00C896">
  <link rel="apple-touch-icon" href="/DataBlitz/icons/icon-192.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>DataBlitz</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d0d0f;
      --bg-card:  #1c1c1f;
      --bg-item:  #242428;
      --border:   rgba(255,255,255,.08);
      --text:     #f0f0f2;
      --text-sec: #a0a0a8;
      --text-muted:#606068;
      --accent:   #00C896;
      --r-sm:     6px;
      --r-md:     10px;
      --font:     -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    }

    html, body {
      height: 100%; background: var(--bg);
      color: var(--text); font-family: var(--font);
    }

    button { cursor: pointer; border: none; background: none;
             font-family: var(--font); }

    /* ── Layout ── */
    .login-root {
      min-height: 100dvh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px 20px;
    }

    /* ── Logo ── */
    .login-logo {
      display: flex; flex-direction: column;
      align-items: center; gap: 12px;
      margin-bottom: 48px;
    }
    .login-logo-icon {
      width: 72px; height: 72px;
      border-radius: 18px;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; font-weight: 900; color: #000;
      letter-spacing: -1px;
    }
    .login-logo-name {
      font-size: 22px; font-weight: 900;
      letter-spacing: -.5px;
    }
    .login-logo-sub {
      font-size: 13px; color: var(--text-muted);
      margin-top: -6px;
    }

    /* ── Card ── */
    .login-card {
      width: 100%; max-width: 380px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px 24px;
    }
    .login-card-title {
      font-size: 17px; font-weight: 800;
      margin-bottom: 6px;
    }
    .login-card-sub {
      font-size: 13px; color: var(--text-sec);
      margin-bottom: 24px; line-height: 1.5;
    }

    /* ── Input ── */
    .login-input-wrap { position: relative; margin-bottom: 8px; }
    .login-input {
      width: 100%; height: 52px;
      padding: 0 16px;
      background: var(--bg-item);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      color: var(--text);
      font-size: 18px; font-weight: 800;
      letter-spacing: .15em; text-transform: uppercase;
      font-family: var(--font);
      transition: border-color .15s;
    }
    .login-input:focus {
      outline: none; border-color: var(--accent);
    }
    .login-input.error { border-color: #e53935; }
    .login-input::placeholder {
      letter-spacing: .05em; font-weight: 400;
      text-transform: none; color: var(--text-muted);
      font-size: 14px;
    }

    .login-error {
      font-size: 12px; color: #e53935;
      min-height: 18px; margin-bottom: 16px;
      font-weight: 600;
    }

    /* ── Button ── */
    .login-btn {
      width: 100%; height: 52px;
      background: var(--accent); color: #000;
      font-size: 15px; font-weight: 800;
      border-radius: var(--r-md);
      transition: opacity .15s;
      letter-spacing: .02em;
    }
    .login-btn:active { opacity: .8; }

    /* ── Footer ── */
    .login-footer {
      margin-top: 32px;
      font-size: 12px; color: var(--text-muted);
      text-align: center; line-height: 1.6;
    }
    .login-footer a {
      color: var(--text-sec); text-decoration: none;
      border-bottom: 1px solid var(--border);
    }

    /* ── Already logged in banner ── */
    .login-active-banner {
      width: 100%; max-width: 380px;
      background: rgba(0,200,150,.08);
      border: 1px solid rgba(0,200,150,.2);
      border-radius: var(--r-md);
      padding: 14px 16px;
      margin-bottom: 16px;
      display: none;
    }
    .login-active-banner.show { display: block; }
    .login-active-team-name {
      font-size: 14px; font-weight: 800;
      color: var(--accent); margin-bottom: 4px;
    }
    .login-active-sub {
      font-size: 12px; color: var(--text-sec);
      margin-bottom: 10px;
    }
    .login-active-btns {
      display: flex; gap: 8px;
    }
    .login-active-enter {
      flex: 1; height: 36px;
      background: var(--accent); color: #000;
      font-size: 13px; font-weight: 800;
      border-radius: var(--r-sm);
    }
    .login-active-switch {
      height: 36px; padding: 0 14px;
      background: var(--bg-item);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      color: var(--text-muted);
      font-size: 13px; font-weight: 600;
    }
  </style>
</head>
<body>
<div class="login-root">

  <!-- Logo -->
  <div class="login-logo">
    <div class="login-logo-icon">DB</div>
    <div class="login-logo-name">DataBlitz</div>
    <div class="login-logo-sub">Football Analytics</div>
  </div>

  <!-- Banner equipo activo -->
  <div class="login-active-banner" id="active-banner">
    <div class="login-active-team-name" id="active-team-name"></div>
    <div class="login-active-sub">Sesión activa en este dispositivo</div>
    <div class="login-active-btns">
      <button class="login-active-enter" id="btn-enter-active">
        Entrar →
      </button>
      <button class="login-active-switch" id="btn-switch">
        Cambiar equipo
      </button>
    </div>
  </div>

  <!-- Card de login -->
  <div class="login-card" id="login-card">
    <div class="login-card-title">Acceder</div>
    <div class="login-card-sub">
      Ingresa el código de tu equipo para continuar.
    </div>

    <div class="login-input-wrap">
      <input class="login-input" id="login-code"
             type="text" placeholder="Código de equipo"
             maxlength="20" autocomplete="off"
             autocorrect="off" autocapitalize="characters"
             spellcheck="false"/>
    </div>
    <div class="login-error" id="login-error"></div>

    <button class="login-btn" id="btn-login">Entrar</button>
  </div>

  <!-- Footer -->
  <div class="login-footer">
    ¿No tienes un código? Contacta a tu analista.
  </div>

</div>

<script src="js/teamConfig.js"></script>
<script>
'use strict';

function showError(msg) {
  const el = document.getElementById('login-error');
  const input = document.getElementById('login-code');
  el.textContent = msg;
  input.classList.add('error');
  setTimeout(() => {
    el.textContent = '';
    input.classList.remove('error');
  }, 3000);
}

const ADMIN_CODE = 'S2YB-MY95GA-J4N22'; 

async function doLogin() {
  const code = document.getElementById('login-code').value.trim().toUpperCase();

  if (!code) {
    showError('Ingresa tu código de equipo.');
    return;
  }

  // Código admin — redirigir a admin.html
  if (code === ADMIN_CODE) {
    window.location.href = 'admin.html';
    return;
  }

  if (!TeamConfig.teamExists(code)) {
    const SB_URL = 'https://jaavutcczjshpxdoylwy.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImphYXZ1dGNjempzaHB4ZG95bHd5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NDkzNTAsImV4cCI6MjA5MDEyNTM1MH0.QKajbSImavHha9P9jY8xk_4BMFbdjV4Lv_7zUL2KFSk';

    const btn = document.getElementById('btn-login');
    btn.textContent = 'Verificando...';
    btn.disabled = true;

    try {
      const res = await fetch(
        `${SB_URL}/rest/v1/teams?team_code=eq.${code}&select=team_code,config_json&apikey=${SB_KEY}`,
        { headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` } }
      );
      const rows = await res.json();
      if (!rows || rows.length === 0) {
        showError('Código inválido. Verifica con tu analista.');
        btn.textContent = 'Entrar';
        btn.disabled = false;
        return;
      }
      TeamConfig.registerTeam(code, ['gametime', 'pp']);
      const remoteConfig = rows[0].config_json;
      if (remoteConfig) {
        // Guardar config remota siempre que tenga nombre real (no el code como nombre)
        const hasRealName = remoteConfig.name && remoteConfig.name !== code;
        if (remoteConfig.configuredAt || hasRealName) {
          // Asegurar que configuredAt exista para que isConfigured() retorne true
          if (!remoteConfig.configuredAt) {
            remoteConfig.configuredAt = new Date().toISOString();
          }
          localStorage.setItem(`${code}:playsync_team_config`, JSON.stringify(remoteConfig));
        }
      }
    } catch (err) {
      showError('Sin conexión. Intenta de nuevo.');
      btn.textContent = 'Entrar';
      btn.disabled = false;
      return;
    }

    btn.textContent = 'Entrar';
    btn.disabled = false;
  }

  // Código de equipo normal
  if (!TeamConfig.login(code)) {
    showError('Código inválido. Verifica con tu analista.');
    return;
  }

  if (TeamConfig.isConfigured()) {
    window.location.href = 'index.html';
  } else {
    window.location.href = 'onboarding.html';
  }
}

document.addEventListener('DOMContentLoaded', () => {
  const activeTeam = TeamConfig.getActiveTeam();

  if (activeTeam) {
    // Mostrar banner de sesión activa
    const banner = document.getElementById('active-banner');
    const card   = document.getElementById('login-card');
    const cfg    = TeamConfig.get();

    document.getElementById('active-team-name').textContent =
      cfg.name !== 'Mi Equipo' ? `${cfg.name} (${activeTeam})` : activeTeam;

    banner.classList.add('show');
    card.style.display = 'none';

    document.getElementById('btn-enter-active').addEventListener('click', () => {
      if (TeamConfig.isConfigured()) {
        window.location.href = 'index.html';
      } else {
        window.location.href = 'onboarding.html';
      }
    });

    document.getElementById('btn-switch').addEventListener('click', () => {
      TeamConfig.clearActiveTeam();
      banner.classList.remove('show');
      card.style.display = 'block';
      document.getElementById('login-code').focus();
    });
  } else {
    document.getElementById('login-code').focus();
  }

  // Events
  document.getElementById('btn-login').addEventListener('click', doLogin);
  document.getElementById('login-code').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
  document.getElementById('login-code').addEventListener('input', function() {
    this.value = this.value.toUpperCase();
  });
});
</script>
</body>
</html>
